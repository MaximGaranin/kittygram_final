name: Kittygram CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  DOCKER_HUB_USERNAME: ${{ secrets.DOCKER_HUB_USERNAME }}
  TELEGRAM_TO: ${{ secrets.TELEGRAM_TO }}
  TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend deps
        working-directory: ./backend
        run: |
          sudo apt-get update && sudo apt-get install -y \
            gcc \
            libjpeg-dev \
            libpng-dev \
            libwebp-dev \
            libtiff-dev \
            libfreetype6-dev \
            liblcms2-dev \
            libopenjp2-7-dev \
            libzip-dev \
            libpq-dev \
            && sudo rm -rf /var/lib/apt/lists/* \
            && python -m pip install --upgrade pip \
            && pip install -r requirements.txt \
            && pip install ruff

      - name: Run Ruff (backend lint)
        working-directory: ./backend
        run: ruff check .

      - name: Run backend tests
        working-directory: ./backend
        env:
          SECRET_KEY: "django-insecure-test-key-for-ci-cd-123"
          DEBUG: "True"
          DB_ENGINE: "django.db.backends.sqlite3"
          DB_NAME: ":memory:"
        run: |
          python manage.py test --keepdb --parallel

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install frontend deps
        working-directory: ./frontend
        run: |
          npm ci

      - name: Run frontend tests
        working-directory: ./frontend
        run: |
          npm test -- --watch=false

  build_and_push:
    needs: tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: |
            ${{ env.DOCKER_HUB_USERNAME }}/kittygram_backend:latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: frontend/Dockerfile
          push: true
          tags: |
            ${{ env.DOCKER_HUB_USERNAME }}/kittygram_frontend:latest

      - name: Build and push gateway image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: nginx/Dockerfile
          push: true
          tags: |
            ${{ env.DOCKER_HUB_USERNAME }}/kittygram_gateway:latest

      - name: Send Telegram notify on success
        if: success()
        uses: appleboy/telegram-action@v0.1.0
        with:
          to: ${{ env.TELEGRAM_TO }}
          token: ${{ env.TELEGRAM_TOKEN }}
          message: |
            ✅ Kittygram CI/CD успешно выполнен!
            Repo: ${{ github.repository }}
            Commit: ${{ github.sha }}
